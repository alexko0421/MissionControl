name: MissionControl
options:
  bundleIdPrefix: com.missioncontrol
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  MissionControl:
    type: application
    platform: macOS
    dependencies:
      - target: mc-bridge
    sources:
      - path: MissionControl
        excludes:
          - "Bridge/**"
    postCompileScripts:
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Helpers"
          cp "${BUILT_PRODUCTS_DIR}/mc-bridge" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Helpers/mc-bridge"
        name: "Embed mc-bridge into app bundle"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.missioncontrol.app
        PRODUCT_NAME: MissionControl
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_LSUIElement: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_CFBundleDisplayName: "Mission Control"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  mc-bridge:
    type: tool
    platform: macOS
    sources:
      - path: Bridge
    settings:
      base:
        PRODUCT_NAME: mc-bridge
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
    postBuildScripts:
      - script: |
          mkdir -p "${PROJECT_DIR}/MissionControl/Helpers"
          cp "${BUILT_PRODUCTS_DIR}/mc-bridge" "${PROJECT_DIR}/MissionControl/Helpers/mc-bridge"
        name: "Copy bridge binary"
